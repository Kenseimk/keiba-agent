name: keiba-predict-notify

on:
  schedule:
    # 朝7時JST (UTC前日22時): 前半レース(1〜6R)取得
    - cron: '0 22 * * 5'   # 金曜22時UTC = 土曜7時JST
    - cron: '0 22 * * 6'   # 土曜22時UTC = 日曜7時JST
    # 昼12時JST (UTC当日3時): 後半レース(7〜12R)取得 + 予測
    - cron: '0 3 * * 6'    # 土曜3時UTC = 土曜12時JST
    - cron: '0 3 * * 0'    # 日曜3時UTC = 日曜12時JST
  workflow_dispatch:
    inputs:
      capital:
        description: '現在の軍資金 (円)'
        default: '70000'
        required: false
      date:
        description: '取得日 YYYYMMDD (省略=今日)'
        default: ''
        required: false
      phase:
        description: '実行フェーズ: am=前半取得のみ / pm=後半取得+予測 / all=全取得+予測'
        default: 'all'
        required: false
        type: choice
        options:
          - all
          - am
          - pm

# ─────────────────────────────────────────────────────────
# JOB 1: 朝7時 — 前半レース(1〜6R)取得 & Artifact保存
# ─────────────────────────────────────────────────────────
jobs:
  scrape-am:
    if: |
      (github.event_name == 'schedule' &&
        (github.event.schedule == '0 22 * * 5' || github.event.schedule == '0 22 * * 6')) ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.phase == 'am' || github.event.inputs.phase == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4

      - name: 対象日決定
        id: set_date
        run: |
          python3 - << 'PYEOF'
          import os, datetime
          input_date = os.environ.get('INPUT_DATE', '').strip()
          event_name = os.environ.get('GITHUB_EVENT_NAME', '')
          if input_date:
              target = input_date
          elif event_name == 'schedule':
              # スケジュール実行: 翌日 (UTC22時 = JST翌日7時)
              d = datetime.date.today() + datetime.timedelta(days=1)
              target = d.strftime('%Y%m%d')
          else:
              # 手動実行: 今日
              target = datetime.date.today().strftime('%Y%m%d')
          print(f'対象日: {target}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'target_date={target}\n')
          PYEOF
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}

      - name: 前半レース取得 (1〜6R)
        run: |
          python scrape_entries.py \
            --date ${{ steps.set_date.outputs.target_date }} \
            --race-max 6 \
            --output predict_input_am.csv
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Artifactに保存
        uses: actions/upload-artifact@v4
        with:
          name: predict-input-am-${{ steps.set_date.outputs.target_date }}
          path: predict_input_am.csv
          retention-days: 1

      - name: 前半レース予測 & Discord通知
        run: |
          cp predict_input_am.csv predict_input.csv
          python predict_notify.py \
            --capital ${{ github.event.inputs.capital || '70000' }} \
            --input predict_input.csv \
            --data data \
            --date ${{ steps.set_date.outputs.target_date }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CURRENT_CAPITAL: ${{ github.event.inputs.capital || '70000' }}

      - name: エラー時Discord通知
        if: failure()
        run: |
          python3 - << 'PYEOF'
          import requests, os
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '')
          if not webhook: exit(0)
          run_url = (f'https://github.com/{os.environ["GITHUB_REPOSITORY"]}'
                     f'/actions/runs/{os.environ["GITHUB_RUN_ID"]}')
          payload = {'embeds': [{'title': '🚨 前半取得 エラー',
              'description': f'[ログを確認する]({run_url})', 'color': 0xe74c3c}]}
          requests.post(webhook, json=payload, timeout=10)
          PYEOF
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}


# ─────────────────────────────────────────────────────────
# JOB 2: 昼12時 or 手動 — 後半取得 + 結合 + 予測
# ─────────────────────────────────────────────────────────
  predict-pm:
    if: |
      (github.event_name == 'schedule' &&
        (github.event.schedule == '0 3 * * 6' || github.event.schedule == '0 3 * * 0')) ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.phase == 'pm' || github.event.inputs.phase == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4

      - name: 対象日決定
        id: set_date
        run: |
          python3 - << 'PYEOF'
          import os, datetime
          input_date = os.environ.get('INPUT_DATE', '').strip()
          if input_date:
              target = input_date
          else:
              # 昼12時JST = UTC3時: today() = 当日
              target = datetime.date.today().strftime('%Y%m%d')
          print(f'対象日: {target}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'target_date={target}\n')
          PYEOF
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}

      - name: 後半レース取得 (7〜12R)
        run: |
          python scrape_entries.py \
            --date ${{ steps.set_date.outputs.target_date }} \
            --race-min 7 \
            --output predict_input.csv
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: レースなし判定
        id: check_rows
        run: echo "rows=$(wc -l < predict_input.csv)" >> $GITHUB_OUTPUT

      - name: レースなし通知
        if: steps.check_rows.outputs.rows == '1'
        run: |
          python3 - << 'PYEOF'
          import requests, os
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '')
          if not webhook: exit(0)
          d = os.environ.get('TARGET_DATE', '')
          payload = {'embeds': [{'title': '🏇 競馬予測',
              'description': f'{d} はJRA開催なし（または出馬表未公開）',
              'color': 0x95a5a6}]}
          requests.post(webhook, json=payload, timeout=10)
          PYEOF
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET_DATE: ${{ steps.set_date.outputs.target_date }}

      - name: 予測実行 & Discord通知
        if: steps.check_rows.outputs.rows != '1'
        run: |
          python predict_notify.py \
            --capital ${{ github.event.inputs.capital || '70000' }} \
            --input predict_input.csv \
            --data data \
            --date ${{ steps.set_date.outputs.target_date }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CURRENT_CAPITAL: ${{ github.event.inputs.capital || '70000' }}

      - name: エラー時Discord通知
        if: failure()
        run: |
          python3 - << 'PYEOF'
          import requests, os
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '')
          if not webhook: exit(0)
          run_url = (f'https://github.com/{os.environ["GITHUB_REPOSITORY"]}'
                     f'/actions/runs/{os.environ["GITHUB_RUN_ID"]}')
          payload = {'embeds': [{'title': '🚨 競馬予測 エラー',
              'description': f'[ログを確認する]({run_url})', 'color': 0xe74c3c}]}
          requests.post(webhook, json=payload, timeout=10)
          PYEOF
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
