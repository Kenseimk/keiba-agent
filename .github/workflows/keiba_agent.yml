name: keiba-agent

on:
  schedule:
    - cron: '30 0 * * 6'   # 毎週土曜 09:30 JST（朝の予想）
    - cron: '30 0 * * 0'   # 毎週日曜 09:30 JST（朝の予想）
    - cron: '0 12 * * 6'   # 毎週土曜 21:00 JST（夜間学習）
    - cron: '0 12 * * 0'   # 毎週日曜 21:00 JST（夜間学習）
    - cron: '0 4 * * 6,0'  # 毎週土日 13:00 JST（13:30発走の30分前）
    - cron: '30 4 * * 6,0' # 毎週土日 13:30 JST（14:00発走の30分前）
    - cron: '0 5 * * 6,0'  # 毎週土日 14:00 JST（14:30発走の30分前）
    - cron: '30 5 * * 6,0' # 毎週土日 14:30 JST（15:00発走の30分前）
    - cron: '0 6 * * 6,0'  # 毎週土日 15:00 JST（15:30発走の30分前）
    - cron: '15 6 * * 6,0' # 毎週土日 15:15 JST（15:45発走の30分前）
    - cron: '0 0 1 * *'    # 毎月1日 09:00 JST（月初補充）
  workflow_dispatch:
    inputs:
      mode:
        description: 'morning or evening'
        required: true
        default: 'morning'
        type: choice
        options: [morning, evening, prerace, cashier_end, cashier_start, refactor, apply_params, test_discord]
      date:
        description: '日付 (YYYYMMDD, 省略で今日)'
        required: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 朝の予想実行
        if: |
          (github.event_name == 'schedule' && startsWith(github.event.schedule, '30 0')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          KEIBA_BUDGET: '10000'
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then python main.py morning
          else python main.py morning $DATE
          fi

      - name: 夜間学習実行
        if: |
          (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 12')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evening')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then python main.py evening
          else python main.py evening $DATE
          fi

      - name: 発走30分前チェック
        if: |
          (github.event_name == 'schedule' && 
           (startsWith(github.event.schedule, '0 4') || startsWith(github.event.schedule, '30 4') ||
            startsWith(github.event.schedule, '0 5') || startsWith(github.event.schedule, '30 5') ||
            startsWith(github.event.schedule, '0 6') || startsWith(github.event.schedule, '15 6'))) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'prerace')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then python main.py prerace
          else python main.py prerace $DATE
          fi

      - name: 月末軍資金精算（cashier_end）
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'cashier_end')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then python main.py cashier_end
          else python main.py cashier_end $DATE
          fi

      - name: 月初軍資金補充（cashier_start）
        if: |
          (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 0 1')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'cashier_start')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then python main.py cashier_start
          else python main.py cashier_start $DATE
          fi

      - name: パラメータ改修ループ（refactor）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'refactor'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then python main.py refactor
          else python main.py refactor $DATE
          fi

      - name: パラメータ適用（apply_params）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'apply_params'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python main.py apply_params

      - name: Discord接続テスト
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test_discord'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py test_discord

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
